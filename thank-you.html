<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Thank You | Benedick Tiaga</title>
  <style>
    :root {
      --ink: #18211f;
      --muted: #5d6a66;
      --soft: #f5f7f2;
      --paper: #ffffff;
      --line: #d9e1db;
      --teal: #0f766e;
      --teal-dark: #0b514b;
      --charcoal: #24302d;
      --radius: 8px;
      --max: 920px;
      --shadow: 0 18px 48px rgba(24, 33, 31, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(16, 26, 24, 0.9), rgba(16, 26, 24, 0.55)),
        url("hero-operations.png") center / cover no-repeat;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(100% - 2rem, var(--max));
      margin: 0 auto;
    }

    .nav {
      padding: 1rem 0;
      color: white;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 900;
    }

    .brand-mark {
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      color: white;
      background: linear-gradient(135deg, var(--teal-dark), var(--teal));
      font-size: 0.95rem;
      font-weight: 900;
    }

    main {
      display: grid;
      align-items: center;
      min-height: calc(100vh - 88px);
      padding: 4rem 0;
    }

    .panel {
      max-width: 720px;
      padding: 2rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 4.8rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    p {
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0.82rem 1rem;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-weight: 900;
    }

    .button-primary {
      color: white;
      background: var(--teal);
    }

    .button-secondary {
      color: var(--teal-dark);
      background: transparent;
      border-color: var(--teal);
    }

    @media (max-width: 640px) {
      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container">
      <a href="index.html" class="brand">
        <span class="brand-mark">BT</span>
        <span>Benedick Tiaga</span>
      </a>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="panel">
        <h1>Thanks for sharing the details.</h1>
        <p>I will review your answers before the call so we can use our time well.</p>
        <p>If the project does not look like the right fit, I may reply by email instead of scheduling a call.</p>
        <div class="actions">
          <!-- Replace this # with the real Calendly or Google Calendar appointment link. -->
          <a class="button button-primary" href="https://calendly.com/benedick-tiaga04/30min">Book a Discovery Call</a>
          <a class="button button-secondary" href="index.html">Return Home</a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
